server:
  port: 8083

spring:
  application:
    name: shipping-service

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          multiplier: 2.0
          max-interval: 10000
        default-requeue-rejected: false
        acknowledge-mode: auto
        prefetch: 10

logging:
  level:
    com.globalbooks: DEBUG
    org.springframework.amqp: INFO
